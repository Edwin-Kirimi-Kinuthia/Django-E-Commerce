{% extends "base.html" %}
{% block title %}Reset Password — ShopMart{% endblock %}
{% block content %}
<div class="amz-container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="amz-auth-box">
        <div class="auth-logo">ShopMart</div>
        <h2 class="auth-title">Reset your password</h2>
        <p style="font-size:14px;color:var(--amz-muted);margin-bottom:16px;">
          Enter your email address and we'll send you a link to reset your password.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label style="font-size:13px;font-weight:600;">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="amz-btn-primary" style="margin-top:8px;">Send Reset Link</button>
        </form>
        <div style="text-align:center;margin-top:14px;font-size:13px;">
          <a href="{% url 'signin' %}" style="color:var(--amz-link);">Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Password Reset Complete — ShopMart{% endblock %}
{% block content %}
<div class="amz-container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="amz-auth-box" style="text-align:center;">
        <div style="font-size:52px;color:var(--amz-green);margin-bottom:12px;"><i class="fas fa-check-circle"></i></div>
        <h2 class="auth-title">Password updated!</h2>
        <p style="font-size:14px;color:var(--amz-muted);margin-bottom:20px;">
          Your password has been set. You can now sign in with your new password.
        </p>
        <a href="{% url 'signin' %}" class="amz-btn-primary" style="display:inline-block;width:auto;padding:9px 24px;">
          Sign In
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

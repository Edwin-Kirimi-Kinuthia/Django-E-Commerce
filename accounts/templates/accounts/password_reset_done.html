{% extends "base.html" %}
{% block title %}Check Your Email — ShopMart{% endblock %}
{% block content %}
<div class="amz-container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="amz-auth-box" style="text-align:center;">
        <div style="font-size:52px;color:var(--amz-green);margin-bottom:12px;"><i class="fas fa-envelope-open-text"></i></div>
        <h2 class="auth-title">Check your email</h2>
        <p style="font-size:14px;color:var(--amz-muted);margin-bottom:20px;">
          If an account exists for that email, we've sent password reset instructions.
          Check your inbox (and spam folder).
        </p>
        <a href="{% url 'shop:allProdCat' %}" class="amz-btn-primary" style="display:inline-block;width:auto;padding:9px 24px;">
          Return to Home
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
